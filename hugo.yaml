baseURL: https://lantgabor.github.io/prog-learn/
locale: hu
title: Python tanfolyam

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [["\\[", "\\]"], ["$$", "$$"]]
          inline: [["\\(", "\\)"]]
        enable: true

math: true

disableKinds:
  - taxonomy
  - term

params:
  description: Python programozás alapok magyarul
  navbar:
    displayTitle: true
  page:
    width: wide
  imageZoom:
    enable: true
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false

menu:
  main:
    - name: Tananyag
      pageRef: /docs
      weight: 1
